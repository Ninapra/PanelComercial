{% extends 'base.html' %}
{% block title %}Cambiar Contrasena{% endblock %}
{% block page_title %}Cambiar Contrasena{% endblock %}
{% block content %}
<div style="max-width:420px;">
  <div class="panel">
    <div class="panel-hdr"><h3>Actualizar contrasena</h3></div>
    <div style="padding:20px;">
      <form method="POST">
        <div class="form-g"><label>Contrasena actual</label><input type="password" name="actual" required></div>
        <div class="form-g"><label>Nueva contrasena</label><input type="password" name="nueva" required minlength="8"><div class="form-hint">Minimo 8 caracteres</div></div>
        <div class="form-g"><label>Confirmar nueva contrasena</label><input type="password" name="confirmar" required></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Actualizar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
